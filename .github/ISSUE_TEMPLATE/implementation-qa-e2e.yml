name: Implementation - QA E2E
description: Implement one contour-owned QA or test-asset change inside a block delivery task.
title: "[QA E2E] "
labels:
  - "task_type: implementation"
  - "contour: qa-e2e"
body:
  - type: markdown
    attributes:
      value: |
        QA E2E implementation task.
        Use this when a delivery block needs contour-owned test assets, fixtures, scripts, or validation automation before the separate `e2e` validation task runs.
        The `task_type` is fixed as `implementation`, contour as `qa-e2e`.
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_block_task
    attributes:
      label: parent_block_task
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: validation_asset
    attributes:
      label: validation_asset
      description: Which test asset or validation automation does this task create or update?
      placeholder: Playwright spec, test fixture, mock data, validation script, smoke checklist
    validations:
      required: true
  - type: textarea
    id: target_flow
    attributes:
      label: target_flow
      description: Which user flow or acceptance boundary does this asset support?
      placeholder: Describe the flow, acceptance slice, or block-level validation boundary.
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: docs/analysis/user-scenarios.md, docs/analysis/version-scope-and-acceptance.md, linked block_delivery issue
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#789 or none"
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: All items must be checked before the task moves to Ready.
      value: |
        - [ ] validation_asset is described
        - [ ] target_flow is specified
        - [ ] all dependent tasks are closed
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: All items must be checked before the task can be closed.
      value: |
        - [ ] the contour-owned QA asset is implemented and verified
        - [ ] validation inputs and assumptions are documented
        - [ ] downstream block-level testing can start without guessing
        - [ ] code committed and pushed
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = blocks other tasks; medium = independent implementation task; low = improvement not blocking progress"
      options:
        - medium
        - high
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
