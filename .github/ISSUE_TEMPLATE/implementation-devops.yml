name: Implementation - DevOps
description: Implement one contour-owned DevOps change inside a block delivery task.
title: "[DevOps] "
labels:
  - "task_type: implementation"
  - "contour: devops"
body:
  - type: markdown
    attributes:
      value: |
        DevOps implementation task.
        Use this when a delivery block needs a contour-owned automation, environment, or release-engineering change that is narrower than the standalone `infrastructure` or `deploy` task types.
        The `task_type` is fixed as `implementation`, contour as `devops`.
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_block_task
    attributes:
      label: parent_block_task
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: delivery_change
    attributes:
      label: delivery_change
      description: Which bounded DevOps change does this task implement?
      placeholder: Describe the workflow, environment, secrets, container, or automation change.
    validations:
      required: true
  - type: textarea
    id: target_surface
    attributes:
      label: target_surface
      description: Which environment, workflow, or runtime surface is affected?
      placeholder: staging workflow, deployment job, preview environment, runtime secret wiring
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: docs/09-integrations.md, docs/runbooks/deployment-runbook.md, linked block_delivery issue
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#789 or none"
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: All items must be checked before the task moves to Ready.
      value: |
        - [ ] delivery_change is described
        - [ ] target_surface is specified
        - [ ] all dependent tasks are closed
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: All items must be checked before the task can be closed.
      value: |
        - [ ] the bounded DevOps change is implemented and verified
        - [ ] any required workflow, environment, or runbook docs are updated
        - [ ] downstream tasks can continue without guessing
        - [ ] code committed and pushed
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = blocks other tasks; medium = independent implementation task; low = improvement not blocking progress"
      options:
        - medium
        - high
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
